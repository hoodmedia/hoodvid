<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hood Media</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#000;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:#fff;
}

.container{
width:100%;
max-width:420px;
position:relative;
}

.ad-box{
width:100%;
margin:12px 0;
text-align:center;
}

video{
width:100%;
border-radius:12px;
background:#000;
display:none;
}

.title{
font-size:16px;
margin:12px 0;
text-align:center;
}

.loading-box{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
border-radius:12px;
z-index:20;
}

.loading-text{
margin-bottom:12px;
font-size:14px;
}

.progress-bar{
width:70%;
height:6px;
background:#333;
border-radius:10px;
overflow:hidden;
}

.progress{
width:0%;
height:100%;
background:#00ffcc;
}
</style>
</head>

<body>

<div class="container">

<!-- IKLAN ATAS -->
<div class="ad-box">
PASTE KODE IKLAN ATAS DISINI
</div>

<!-- VIDEO -->
<video id="videoPlayer" controls autoplay muted playsinline>
<source id="videoSource" src="" type="video/mp4">
</video>

<!-- LOADING -->
<div class="loading-box" id="loadingBox">
<div class="loading-text" id="loadingText">Loading video...</div>
<div class="progress-bar">
<div class="progress" id="progressBar"></div>
</div>
</div>

<!-- IKLAN BAWAH -->
<div class="ad-box">
PASTE KODE IKLAN BAWAH DISINI
</div>

<div class="title">
Watch till the end 😳🔥
</div>

</div>

<script>
// ambil parameter ?v=
const params = new URLSearchParams(window.location.search);
const videoId = params.get("v");

const video = document.getElementById("videoPlayer");
const source = document.getElementById("videoSource");

if(videoId){
source.src = "https://cdn.videy.co/" + videoId + ".mp4";
video.load();
}else{
document.querySelector(".title").innerText = "Video not found";
}

// FAKE LOADING
let progress = 0;
const progressBar = document.getElementById("progressBar");
const loadingText = document.getElementById("loadingText");

let loadingInterval = setInterval(() => {
progress += Math.random() * 15;

if(progress >= 100){
progress = 100;
clearInterval(loadingInterval);

document.getElementById("loadingBox").style.display = "none";
video.style.display = "block";
video.play();

}else if(progress > 60){
loadingText.innerText = "Preparing content...";
}

progressBar.style.width = progress + "%";

}, 300);
</script>

</body>
</html>
