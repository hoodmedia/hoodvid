<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Videy</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#fff;
}

.container{
  width:100%;
  max-width:420px;
  position:relative;
  padding:10px;
}

.video-wrapper{
  position:relative;
  width:100%;
  border-radius:12px;
  overflow:hidden;
  background:#000;
}

video{
  width:100%;
  display:block;
  background:#000;
}

/* PLAY BUTTON */
.play-overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.35);
  cursor:pointer;
  z-index:10;
}

.play-button{
  width:90px;
  height:90px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(5px);
  display:flex;
  justify-content:center;
  align-items:center;
  border:2px solid rgba(255,255,255,0.25);
}

.play-button:before{
  content:'';
  border-style:solid;
  border-width:18px 0 18px 28px;
  border-color:transparent transparent transparent #fff;
  margin-left:6px;
}

.title{
  font-size:16px;
  margin-top:14px;
  text-align:center;
}

/* OPTIONAL STATS */
.stats{
  font-size:12px;
  opacity:0.7;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="video-wrapper" id="videoWrapper">

  <!-- VIDEO -->
  <video id="videoPlayer" controls playsinline>
    <source id="videoSource" src="" type="video/mp4">
  </video>

  <!-- PLAY OVERLAY -->
  <div class="play-overlay" id="playOverlay">
    <div class="play-button"></div>
  </div>

</div>

<div class="title">
  Watch till the end 😳🔥
</div>

<!-- OPTIONAL STATS -->
<div class="stats" id="statsBox"></div>

</div>

<script>
// ========================
// 🎬 VIDEO SETUP
// ========================
const params = new URLSearchParams(window.location.search);
const videoId = params.get("v");

const video = document.getElementById("videoPlayer");
const source = document.getElementById("videoSource");
const playOverlay = document.getElementById("playOverlay");
const videoWrapper = document.getElementById("videoWrapper");

if(videoId){
  source.src = "https://cdn.videy.co/" + videoId + ".mp4";
  video.load();
}else{
  document.querySelector(".title").innerText = "Video not found";
}

// ========================
// 📊 TRACKING SYSTEM
// ========================
let stats = {
  clicks: 0,
  adOpened: 0,
  videoPlay: 0
};

// load dari localStorage
if(localStorage.getItem("stats")){
  stats = JSON.parse(localStorage.getItem("stats"));
}

function updateStats(){

  localStorage.setItem("stats", JSON.stringify(stats));

  document.getElementById("statsBox").innerHTML =
    "Clicks: " + stats.clicks +
    " | Ads Opened: " + stats.adOpened +
    " | Video Play: " + stats.videoPlay;
}

// ========================
// 🔥 OPEN AD ON VIDEO CLICK
// ========================
let adTriggered = false;

function triggerAdAndPlay(){

  stats.clicks++;
  updateStats();

  // buka iklan hanya sekali
  if(!adTriggered){

    adTriggered = true;

    stats.adOpened++;
    updateStats();

    window.open(
      "https://www.profitablecpmratenetwork.com/nc5zmcjibj?key=267ff36a04b29602b5b5fbac97af086f",
      "_blank"
    );
  }

  // play video
  video.play();

  // hide overlay
  playOverlay.style.display = "none";
}

// klik area video
playOverlay.addEventListener("click", triggerAdAndPlay);

// klik video juga trigger
video.addEventListener("click", function(){

  if(video.paused){
    triggerAdAndPlay();
  }

});

// ========================
// 🎥 TRACK VIDEO PLAY
// ========================
video.addEventListener("play", function(){

  stats.videoPlay++;
  updateStats();

});

// tampilkan awal
updateStats();

</script>
