<title>Hood Media</title>

<style>
*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
background:#000;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:#fff;
}

.container{
width:100%;
max-width:420px;
position:relative;
}

.ad-box{
width:100%;
margin:12px 0;
text-align:center;
}

video{
width:100%;
border-radius:12px;
background:#000;
display:none;
}

.title{
font-size:16px;
margin:12px 0;
text-align:center;
}

.loading-box{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
border-radius:12px;
z-index:20;
}

.loading-text{
margin-bottom:12px;
font-size:14px;
}

.progress-bar{
width:70%;
height:6px;
background:#333;
border-radius:10px;
overflow:hidden;
}

.progress{
width:0%;
height:100%;
background:#00ffcc;
}

/* DEBUG PANEL (OPSIONAL) */
.stats{
font-size:12px;
opacity:0.7;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- IKLAN ATAS -->
<div class="ad-box">
<script>
  atOptions = {
    'key' : '25e756b410549406cb78cc33b15c7add',

    'height' : 50,
    'width' : 320,
    'params' : {}
  };
</script>
<script src="https://www.highperformanceformat.com/25e756b410549406cb78cc33b15c7add/invoke.js"></script>

</div>

<!-- VIDEO -->
<video id="videoPlayer" controls autoplay muted playsinline>
<source id="videoSource" src="" type="video/mp4">
</video>

<!-- LOADING -->
<div class="loading-box" id="loadingBox">
<div class="loading-text" id="loadingText">Loading video...</div>
<div class="progress-bar">
<div class="progress" id="progressBar"></div>
</div>
</div>

<!-- IKLAN BAWAH -->
<div class="ad-box">
<script>
  atOptions = {
    'key' : '25e756b410549406cb78cc33b15c7add',
    'format' : 'iframe',
    'height' : 50,
    'width' : 320,
    'params' : {}
  };
</script>
<script src="https://www.highperformanceformat.com/25e756b410549406cb78cc33b15c7add/invoke.js"></script>

</div>

<div class="title">
Watch till the end 😳🔥
</div>

<!-- STATS (bisa dihapus kalau ga mau keliatan) -->
<div class="stats" id="statsBox"></div>

</div>

<script>
// ========================
// 🎬 VIDEO SETUP
// ========================
const params = new URLSearchParams(window.location.search);
const videoId = params.get("v");

const video = document.getElementById("videoPlayer");
const source = document.getElementById("videoSource");

if(videoId){
source.src = "https://cdn.videy.co/" + videoId + ".mp4";
video.load();
}else{
document.querySelector(".title").innerText = "Video not found";
}

// ========================
// ⏳ LOADING FAKE
// ========================
let progress = 0;
const progressBar = document.getElementById("progressBar");
const loadingText = document.getElementById("loadingText");

let loadingInterval = setInterval(() => {
progress += Math.random() * 15;

if(progress >= 100){
progress = 100;
clearInterval(loadingInterval);

document.getElementById("loadingBox").style.display = "none";
video.style.display = "block";
video.play();

}else if(progress > 60){
loadingText.innerText = "Preparing content...";
}

progressBar.style.width = progress + "%";

}, 300);

// ========================
// 📊 TRACKING SYSTEM
// ========================
let stats = {
clicks: 0,
adOpened: 0,
videoPlay: 0
};

// load dari localStorage
if(localStorage.getItem("stats")){
stats = JSON.parse(localStorage.getItem("stats"));
}

function updateStats(){
localStorage.setItem("stats", JSON.stringify(stats));

document.getElementById("statsBox").innerHTML =
"Clicks: " + stats.clicks +
" | Ads Opened: " + stats.adOpened +
" | Video Play: " + stats.videoPlay;
}

// ========================
// 🎥 TRACK VIDEO PLAY
// ========================
video.addEventListener("play", function(){
stats.videoPlay++;
updateStats();
});

// ========================
// 🔥 IKLAN CLICK TRACK
// ========================
let adTriggered = false;

document.addEventListener("click", function(){

stats.clicks++;
updateStats();

if(adTriggered) return;

adTriggered = true;
stats.adOpened++;
updateStats();

// buka iklan
window.open("https://www.profitablecpmratenetwork.com/nc5zmcjibj?key=267ff36a04b29602b5b5fbac97af086f", "_blank");

});

// tampilkan awal
updateStats();

</script>
