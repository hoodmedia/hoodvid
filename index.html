<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Videy</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#fff;
  overflow-x:hidden;
}

.container{
  width:100%;
  max-width:420px;
  position:relative;
  padding:10px;
}

.video-wrapper{
  position:relative;
  width:100%;
  border-radius:12px;
  overflow:hidden;
  background:#000;
}

video{
  width:100%;
  display:block;
  background:#000;
}

/* PLAY OVERLAY */
.play-overlay{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.35);
  cursor:pointer;
  z-index:10;
}

.play-button{
  width:90px;
  height:90px;
  border-radius:50%;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(5px);
  display:flex;
  justify-content:center;
  align-items:center;
  border:2px solid rgba(255,255,255,0.25);
}

.play-button:before{
  content:'';
  border-style:solid;
  border-width:18px 0 18px 28px;
  border-color:transparent transparent transparent #fff;
  margin-left:6px;
}

.title{
  font-size:16px;
  margin-top:14px;
  text-align:center;
}

.stats{
  font-size:12px;
  opacity:0.7;
  text-align:center;
  margin-top:10px;
}

/* BLOCK SCREEN */
.block-screen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  z-index:99999;
  display:none;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.block-box{
  width:100%;
  max-width:360px;
  background:#111;
  border:1px solid #222;
  border-radius:16px;
  padding:28px 22px;
  text-align:center;
  color:#fff;
}

.block-box h2{
  font-size:22px;
  margin-bottom:14px;
}

.block-box p{
  font-size:15px;
  opacity:0.85;
  line-height:1.6;
  margin-bottom:22px;
}

.block-box button{
  border:none;
  background:#00d084;
  color:#000;
  font-weight:bold;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
  width:100%;
  font-size:15px;
}
</style>
</head>

<body>

<!-- BLOCK SCREEN -->
<div class="block-screen" id="blockScreen">
  <div class="block-box">
    <h2>AdBlock or VPN Detected</h2>

    <p>
      Please disable your AdBlocker or VPN to continue watching the video.
    </p>

    <button onclick="location.reload()">
      I Disabled It
    </button>
  </div>
</div>

<div class="container">

  <div class="video-wrapper">

    <!-- VIDEO -->
    <video id="videoPlayer" controls playsinline>
      <source id="videoSource" src="" type="video/mp4">
    </video>

    <!-- PLAY BUTTON -->
    <div class="play-overlay" id="playOverlay">
      <div class="play-button"></div>
    </div>

  </div>

  <div class="title">
    Watch till the end 😳🔥
  </div>

  <!-- STATS -->
  <div class="stats" id="statsBox"></div>

</div>

<script>
// ========================
// 🎬 VIDEO SETUP
// ========================

const params = new URLSearchParams(window.location.search);
const videoId = params.get("v");

const video = document.getElementById("videoPlayer");
const source = document.getElementById("videoSource");
const playOverlay = document.getElementById("playOverlay");

if(videoId){

  source.src = "https://cdn.videy.co/" + videoId + ".mp4";
  video.load();

}else{

  document.querySelector(".title").innerText = "Video not found";

}

// ========================
// 📊 TRACKING SYSTEM
// ========================

let stats = {
  clicks: 0,
  adOpened: 0,
  videoPlay: 0
};

// load localStorage
if(localStorage.getItem("stats")){
  stats = JSON.parse(localStorage.getItem("stats"));
}

function updateStats(){

  localStorage.setItem("stats", JSON.stringify(stats));

  document.getElementById("statsBox").innerHTML =
    "Clicks: " + stats.clicks +
    " | Ads Opened: " + stats.adOpened +
    " | Video Play: " + stats.videoPlay;
}

// ========================
// 🚫 BLOCK SCREEN
// ========================

function showBlockScreen(){

  document.getElementById("blockScreen").style.display = "flex";
  document.body.style.overflow = "hidden";

}

// ========================
// 🚫 ADBLOCK DETECTION
// ========================

function detectAdBlock(){

  let ad = document.createElement("div");

  ad.innerHTML = "&nbsp;";
  ad.className = "adsbox";

  document.body.appendChild(ad);

  setTimeout(() => {

    if(
      ad.offsetHeight === 0 ||
      ad.clientHeight === 0 ||
      getComputedStyle(ad).display === "none"
    ){
      showBlockScreen();
    }

    ad.remove();

  }, 100);

}

detectAdBlock();

// ========================
// 🌐 SIMPLE VPN DETECTION
// ========================

const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone;

const suspiciousZones = [
  "UTC",
  "Etc/UTC",
  "Europe/London"
];

if(suspiciousZones.includes(timezone)){
  showBlockScreen();
}

// ========================
// 🔥 OPEN ADS ONLY 1 TIME
// ========================

// cek apakah user sudah pernah lihat iklan
let adAlreadyShown = localStorage.getItem("adAlreadyShown");

// fallback stats
let adTriggered = false;

function triggerAdAndPlay(){

  stats.clicks++;
  updateStats();

  // ========================
  // IKLAN HANYA 1 KALI
  // ========================

  if(!adAlreadyShown && !adTriggered){

    adTriggered = true;

    // simpan bahwa iklan sudah tampil
    localStorage.setItem("adAlreadyShown", "true");

    stats.adOpened += 2;
    updateStats();

    // TAB BARU
    window.open(
      "https://example-ad1.com",
      "_blank"
    );

    // TAB SAAT INI
    setTimeout(() => {

      window.location.href = "https://example-ad2.com";

    }, 300);

  }

  // ========================
  // PLAY VIDEO
  // ========================

  video.play();

  // hide overlay
  playOverlay.style.display = "none";
}

// klik tombol play
playOverlay.addEventListener("click", triggerAdAndPlay);

// klik video
video.addEventListener("click", function(){

  if(video.paused){
    triggerAdAndPlay();
  }

});

// ========================
// 🎥 TRACK VIDEO PLAY
// ========================

video.addEventListener("play", function(){

  stats.videoPlay++;
  updateStats();

});

// tampilkan stats awal
updateStats();

</script>
